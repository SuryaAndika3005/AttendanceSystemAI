<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision AI | Halaman Prediksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --bg-body: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --border-color: #e2e8f0;
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; flex-direction: column; min-height: 100vh; 
        }
        
        /* Navbar Glassmorphism */
        .navbar-custom { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color); 
            padding: 1rem 2rem; 
        }
        .app-brand { font-weight: 800; font-size: 1.3rem; color: var(--primary); letter-spacing: -0.02em;}
        
        .scanner-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2.5rem 0; }
        
        /* Bingkai Kamera Modern */
        .cam-frame { 
            background: var(--surface); 
            padding: 1rem; 
            border-radius: 1.5rem; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 15px 35px -10px rgba(79, 70, 229, 0.15); 
            margin-bottom: 2rem;
            position: relative;
        }
        .cam-frame img { border-radius: 1rem; width: 100%; max-width: 750px; object-fit: cover; }
        
        /* Indikator Merah Berkedip */
        .pulse-dot { 
            display: inline-block; width: 12px; height: 12px; background-color: #ef4444; border-radius: 50%; margin-right: 8px;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        /* Tombol Navigasi */
        .btn-back { 
            background: var(--surface); color: var(--text-main); border: 1px solid var(--border-color); 
            border-radius: 0.75rem; padding: 0.6rem 1.2rem; transition: 0.2s; text-decoration: none; font-weight: 600;
        }
        .btn-back:hover { background: #f1f5f9; border-color: #cbd5e1; color: var(--text-main); transform: translateY(-1px);}

        /* Styling Toast Pop-Up */
        .toast { border-radius: 1rem; border: none; overflow: hidden; }
        .toast-body { padding: 1.2rem; }
    </style>
</head>
<body>

    <nav class="navbar-custom d-flex justify-content-between align-items-center">
        <div class="app-brand"><i class="bi bi-cpu-fill me-2"></i>Vision AI</div>
        <a href="/dashboard" class="btn-back"><i class="bi bi-arrow-right me-2"></i>Ke Halaman Hasil</a>
    </nav>

    <div class="scanner-container container text-center">
        <h2 class="fw-bold mb-1" style="color: #1e293b;"><span class="pulse-dot"></span> Live Prediction Scanner</h2>
        <p class="text-muted mb-4 fw-medium">Arahkan wajah ke kamera dan <strong class="text-primary">ikuti instruksi layar (Kedip / Buka Mulut)</strong> untuk verifikasi.</p>
        
        <div class="cam-frame">
            <img src="{{ url_for('video_feed') }}" alt="Kamera Prediksi AI">
        </div>
        
        <div class="alert alert-primary bg-white border border-primary-subtle text-dark d-inline-block rounded-4 shadow-sm px-4 fw-medium">
            <i class="bi bi-info-circle-fill text-primary me-2"></i> Pastikan pencahayaan ruangan cukup terang.
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-4" style="z-index: 1055;">
        <div id="attendanceToast" class="toast align-items-center text-bg-success shadow-lg" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4500">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center">
                    <i class="bi bi-check-circle-fill fs-2 me-3 text-white"></i>
                    <div>
                        <h6 class="mb-1 fw-bold text-white">Presensi Terekam!</h6>
                        <p class="mb-0 small text-white-50" id="toastMessage">Memuat data...</p>
                    </div>
                </div>
                <button type="button" class="btn-close btn-close-white me-3 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ==========================================
        // OPTIMASI ARSITEKTUR: SERVER-SENT EVENTS (SSE)
        // ==========================================
        
        // Membuka 1 jalur koneksi permanen yang sangat ringan ke rute Python
        const eventSource = new EventSource("/stream_attendance");
        
        // Menunggu 'dorongan' data dari server secara real-time
        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // Update isi Pop-up dengan data orang tersebut
            document.getElementById('toastMessage').innerHTML = 
                `<strong>${data.nama}</strong><br>Waktu: ${data.waktu} WIB (${data.status})`;
            
            // Munculkan Pop-up menggunakan Bootstrap Toast
            const toastEl = document.getElementById('attendanceToast');
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        };

        // Tangani jika koneksi terputus agar browser mencoba nyambung ulang otomatis
        eventSource.onerror = function(err) {
            console.warn("Koneksi event stream terputus, mencoba menyambung kembali...");
        };
    </script>
</body>
</html>
