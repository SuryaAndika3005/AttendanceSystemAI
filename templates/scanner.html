<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scanner AI | Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        
        /* Navbar modern tembus pandang */
        .navbar { 
            background: rgba(30, 41, 59, 0.95); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(12px); 
        }
        .navbar-brand { 
            font-weight: 800; 
            color: #10b981 !important; 
            letter-spacing: 1px; 
            font-size: 1.5rem;
        }
        
        .video-container { text-align: center; margin-top: 40px; }
        
        /* Bingkai Kamera bergaya Glassmorphism */
        .cam-wrapper { 
            display: inline-block; 
            padding: 12px; 
            background: rgba(30, 41, 59, 0.5); 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.15); 
        }
        img.cam-feed { 
            border-radius: 16px; 
            width: 100%; 
            max-width: 800px; 
            object-fit: cover; 
        }
        
        /* Tombol Kembali */
        .btn-custom-outline { 
            border: 1px solid #cbd5e1; 
            color: #cbd5e1; 
            border-radius: 8px; 
            padding: 8px 20px; 
            font-weight: 600; 
            transition: all 0.3s ease; 
            text-decoration: none;
        }
        .btn-custom-outline:hover { 
            background: rgba(255, 255, 255, 0.1); 
            color: #fff; 
        }
        
        /* Efek Berkedip pada indikator LIVE */
        .live-indicator { 
            animation: blink 1.5s infinite; 
            color: #ef4444; 
        }
        @keyframes blink { 
            0% { opacity: 1; } 
            50% { opacity: 0.4; } 
            100% { opacity: 1; } 
        }
    </style>
</head>
<body>
    <nav class="navbar py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand m-0" href="/"><i class="bi bi-cpu"></i> Vision AI</a>
            <a class="btn-custom-outline" href="/"><i class="bi bi-arrow-left me-2"></i> Kembali ke Dashboard</a>
        </div>
    </nav>

    <div class="container text-center mt-5">
        <h2 class="fw-bold mb-2"><i class="bi bi-record-circle live-indicator me-2"></i> Live Vision Monitoring</h2>
        <p style="color: #94a3b8;">Arahkan wajah ke kamera dan berkedip untuk verifikasi Liveness.</p>
        
        <div class="video-container">
            <div class="cam-wrapper">
                <img class="cam-feed" src="{{ url_for('video_feed') }}" alt="Live Camera Feed">
            </div>
        </div>
    </div>
</body>
</html>
