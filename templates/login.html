<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vision AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f0fdf4 0%, #e0e7ff 100%); font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; border-radius: 24px; padding: 3rem; box-shadow: 0 20px 40px rgba(0,0,0,0.08); width: 100%; max-width: 420px; text-align: center;}
        .form-control { border-radius: 12px; padding: 12px 20px; background-color: #f8fafc; border: 1px solid #e2e8f0; font-weight: 500;}
        .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); background-color: white;}
        .btn-primary-custom { background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%); border: none; padding: 12px; border-radius: 12px; font-weight: 600; color: white; width: 100%; transition: all 0.3s; margin-top: 1rem;}
        .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); }
        .app-icon { font-size: 3.5rem; color: #4f46e5; margin-bottom: -10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <i class="bi bi-shield-lock-fill app-icon"></i>
        <h3 class="fw-bold mt-3 mb-1 text-dark">Portal Admin</h3>
        <p class="text-muted small mb-4">Masuk untuk mengelola data presensi</p>
        
        <form id="loginForm" onsubmit="attemptLogin(event)">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold small text-muted ms-1">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Masukkan username" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-bold small text-muted ms-1">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary-custom" id="loginBtn">Masuk ke Dasbor</button>
        </form>
        <a href="/" class="d-block mt-4 text-muted text-decoration-none small fw-medium"><i class="bi bi-arrow-left"></i> Kembali ke Beranda</a>
    </div>

    <script>
        function attemptLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Memeriksa...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            fetch('/login', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    window.location.href = '/dashboard';
                } else {
                    alert(data.message);
                    btn.innerHTML = 'Masuk ke Dasbor';
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
